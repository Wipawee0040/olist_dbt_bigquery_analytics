version: 2

models:
# fct_orders
  - name: fct_orders
    description: "ตารางเก็บข้อมูล Transaction สรุปภาพรวมยอดขายระดับ Order"
    columns:
      - name: order_id
        description: "รหัสออเดอร์ (Primary Key)"
        tests:
          - unique
          - not_null
          
      - name: customer_id
        description: "รหัสลูกค้า (Foreign Key ไปยัง dim_customers)"
        tests:
          - not_null
          
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
              
      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: ['Credit Card', 'Boleto', 'Voucher', 'Debit Card', 'Other']
        
      - name: payment_value
        tests:
          - not_null


# fct_order_items
  - name: fct_order_items
    description: "ตารางเก็บข้อมูลยอดขายระดับชิ้นสินค้า (Grain: 1 บรรทัด = สินค้า 1 ชิ้นใน 1 ออเดอร์)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

    columns:
      - name: order_id
        tests:
          - not_null
          
      - name: order_item_id
        tests:
          - not_null
          
      - name: product_id
        tests:
          - not_null
          
      - name: seller_id
        tests:
          - not_null
          
      - name: price
        tests:
          - not_null
          
      - name: freight_value
        tests:
          - not_null